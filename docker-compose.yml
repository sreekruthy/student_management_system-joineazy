services:
  postgres:
    image: postgres:15
    container_name: student_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abcd
      POSTGRES_DB: student_prof_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: student_backend
    ports:
      - "5001:5001"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:abcd@postgres:5432/student_prof_db

  frontend:
    build: ./frontend
    container_name: student_frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pgdata: