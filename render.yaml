services:
  - type: web
    name: student-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: FRONTEND_URL
        value: https://your-vercel-app.vercel.app

databases:
  - name: student-db
    databaseName: student_prof_db
    